name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1
        with:
          toolchain: stable
          rustflags: ""
      - name: Rust toolchain
        run: |
          rustc --version
          cargo --version
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Check tokio-console integration
        if: matrix.os == 'ubuntu-latest'
        env:
          RUSTFLAGS: --cfg tokio_unstable
        run: cargo check -p nx-cli --features tokio-console

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1
        with:
          toolchain: stable
          components: rustfmt
          rustflags: ""
      - name: Format check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1
        with:
          toolchain: stable
          components: clippy
          rustflags: ""
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1
        with:
          toolchain: stable
          rustflags: ""
      - name: Run tests
        run: cargo test --workspace --verbose

  build-wasm:
    name: Build WASM Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          rustflags: ""
      - name: Build distributed_counter
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path examples/distributed_counter/Cargo.toml
      - name: Build distributed_chat
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path examples/distributed_chat/Cargo.toml
      - name: Build vote_tally_tls
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path examples/vote_tally_tls/Cargo.toml

  cli-smoke:
    name: CLI Multi-process Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          rustflags: ""
      - name: Build distributed_counter
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path examples/distributed_counter/Cargo.toml
      - name: Build previous release binary
        run: |
          git worktree add "${RUNNER_TEMP}/numax-v0.1.0" v0.1.0
          cargo build --release --manifest-path "${RUNNER_TEMP}/numax-v0.1.0/Cargo.toml" -p nx-cli
      - name: Run multi-process CLI smoke test
        env:
          NUMAX_PREVIOUS_NX_BIN: ${{ runner.temp }}/numax-v0.1.0/target/release/nx
        run: cargo test -p nx-cli --test multiprocess_smoke -- --ignored

  benchmark-regression:
    name: Benchmark Regression Gate
    runs-on: ubuntu-latest
    env:
      NUMAX_BENCH_GATE_MODE: ${{ vars.NUMAX_BENCH_GATE_MODE || 'shadow' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1
        with:
          toolchain: stable
          rustflags: ""
      - name: Run sync load benchmark
        run: |
          mkdir -p reports/bench
          cargo bench -p nx-core --bench three_node_sync_load -- \
            --duration-secs 10 \
            --target-ops-sec-per-node 1000 \
            --settle-secs 10 \
            --report reports/bench/three-node-sync-smoke.json
      - name: Compare against baseline
        run: |
          node scripts/compare-benchmark-report.mjs \
            --baseline crates/nx-core/reports/baselines/three-node-sync-smoke.json \
            --current reports/bench/three-node-sync-smoke.json \
            --mode "${NUMAX_BENCH_GATE_MODE}" \
            --p99-threshold 5 \
            --throughput-threshold 5 \
            --rss-threshold 5
      - name: Upload benchmark report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression-report
          path: reports/bench/three-node-sync-smoke.json

  ci-success:
    name: CI Success
    needs: [check, fmt, clippy, test, build-wasm, cli-smoke, benchmark-regression]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]] || \
             [[ "${{ needs.fmt.result }}" != "success" ]] || \
             [[ "${{ needs.clippy.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build-wasm.result }}" != "success" ]] || \
             [[ "${{ needs.cli-smoke.result }}" != "success" ]] || \
             [[ "${{ needs.benchmark-regression.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed!"
